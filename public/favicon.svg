<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradient matching the CSS gradient-primary -->
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:hsl(262, 52%, 47%);stop-opacity:1" />
      <stop offset="100%" style="stop-color:hsl(262, 83%, 58%);stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background rounded rectangle with gradient -->
  <rect x="2" y="2" width="28" height="28" rx="6" ry="6" fill="url(#gradient)"/>
  
  <!-- Rocket icon (simplified version of Lucide rocket) -->
  <g transform="translate(16, 16)" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Rocket body -->
    <path d="m4.5 16.5-1-5.5L18 2l13 13L21.5 24.5l-5.5-1" transform="scale(0.6) translate(-16, -16)"/>
    <!-- Rocket fins -->
    <path d="m6.5 18.5 5 5" transform="scale(0.6) translate(-16, -16)"/>
    <path d="m12 15 5 5" transform="scale(0.6) translate(-16, -16)"/>
    <!-- Rocket window -->
    <circle cx="0" cy="-2" r="2" transform="scale(0.6)"/>
  </g>
</svg>