<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#06B6D4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10B981;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Rounded background with gradient -->
  <rect x="0" y="0" width="32" height="32" rx="6" ry="6" fill="url(#gradient)"/>
  
  <!-- Rocket icon (simplified version) -->
  <g transform="translate(16,16)" fill="white">
    <!-- Rocket body -->
    <path d="M-2,-8 L2,-8 L4,-4 L4,4 L2,6 L-2,6 L-4,4 L-4,-4 Z"/>
    <!-- Rocket tip -->
    <path d="M-2,-8 L0,-12 L2,-8 Z"/>
    <!-- Side flames -->
    <path d="M-4,2 L-6,4 L-4,6 Z"/>
    <path d="M4,2 L6,4 L4,6 Z"/>
    <!-- Window -->
    <circle cx="0" cy="-2" r="1.5" fill="url(#gradient)" opacity="0.5"/>
  </g>
</svg>